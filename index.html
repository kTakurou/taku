<h1>たくろうのホームページ</h1>
<h2>自己紹介</h2>
<p id="age"></p>
<script>
const birthday = new Date(2004, 11, 13); // 月は0から始まるので10月は9
const today = new Date();
let age = today.getFullYear() - birthday.getFullYear();
// 今年の誕生日がまだ来ていなければ1歳引く
const thisYearBirthday = new Date(
    today.getFullYear(),
    birthday.getMonth(),
    birthday.getDate()
);
if (today < thisYearBirthday) {
    age--;
}
document.getElementById("age").textContent = "初めまして。たくろうです。2004年生まれの" + age-1 + "歳です。現在は都内の大学に通っている理系大学生です。";
</script>
<h3>大学</h3>
<p>都内の私立大学に通っています。工学部です。学科は材料系です。</p>
