<head>
    <style>
    body {
        padding: 30px;
        background-color: lime;
    }
    h1 {
        color: white;
    }
    h2, h3, h4, p{
        color: navy;
    }
    </style>
</head>
<div class="container">
    <h1>たくろうのホームページ</h1>
    <h2>自己紹介</h2>
    <p id="age"></p>
    <script>
        const birthday = new Date(2004, 11, 13); 
        // 月は0から始まるので10月は9
        const today = new Date();
        let age = today.getFullYear() - birthday.getFullYear();
        // 今年の誕生日がまだ来ていなければ1歳引く
        const thisYearBirthday = new Date(
            today.getFullYear(),
            birthday.getMonth(),
            birthday.getDate()
        );
        if (today < thisYearBirthday) {
            age--;
        }
        document.getElementById("age").textContent =`初めまして。たくろうです。2004年生まれの${age}歳です。`;
    </script>
    <h3>大学</h3>
    <p>都内の私立大学に通っています。工学部の材料系の学科です。現在は研究室に配属されています。来年度からは現在の大学の大学院に進学します。</p>
    <h3>趣味</h3>
    <h4>バスケットボール</h4>
    <p>小学生の頃から大学2年まで約10年間続けていました。</p>
    <h4>ランニング</h4>
    <p>バスケットボールを辞めた後から始めました。10キロを40分で完走することを目標にしています。来年の市民マラソンに参加しようと思ってます。</p>
    <h4>旅行</h4>
    <p>バスケットボールを辞めた後から旅行に行き始めました。これまでに岡山、浜松、四国に行きました。今後は東北地方に行きたいです。</p>
</div>
